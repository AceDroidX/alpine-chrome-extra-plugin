services:
  chrome:
    image: acedroidx/alpine-chrome-extra-plugin
    container_name: chrome
    build:
      context: .
      args:
        USE_CHINA_MIRROR: "false"
    volumes:
      - chrome-data:/app/puppeteer
    ports:
      - 9222:9222
      - 6080:6080

volumes:
  chrome-data:
    name: chrome-data
